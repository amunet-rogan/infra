# Self-hosted GitHub Actions runner registered at the amunet-rogan org level.
# Ephemeral mode: new container per job → clean state.
#
# Setup:
#   1. Create a GitHub PAT (classic) with scope: admin:org
#      https://github.com/settings/tokens/new
#   2. Copy .env.example to .env and put the PAT into GITHUB_PAT
#   3. docker compose up -d
#
# Verify: org settings → Actions → Runners → should show "amunet-rogan-runner" as Idle

services:
  runner:
    image: myoung34/github-runner:latest
    container_name: amunet-rogan-runner
    restart: always
    env_file: .env
    environment:
      RUNNER_NAME: amunet-rogan-runner
      RUNNER_SCOPE: org
      ORG_NAME: amunet-rogan
      LABELS: self-hosted,amunet,amunet-rogan
      RUNNER_WORKDIR: /tmp/runner
      # EPHEMERAL=true: runner exits after each job, a new one starts for the next.
      # This guarantees clean state but adds ~10s startup per deploy.
      EPHEMERAL: "true"
      # Disable auto-update — we control upgrades by pulling a new image
      DISABLE_AUTO_UPDATE: "true"
    volumes:
      # Docker socket: required to run 'docker compose up' in deploy jobs.
      # This makes the runner effectively root on the host — trust boundary.
      - /var/run/docker.sock:/var/run/docker.sock
      # Runner workdir — persisted across jobs (checkouts, caches)
      - ./data:/tmp/runner
